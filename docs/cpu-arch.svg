<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 910" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="aro" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#c2410c"/>
    </marker>
  </defs>
  <style>
    text{fill:#0f172a}
    .t{font-size:13px;text-anchor:middle}
    .tb{font-size:13px;font-weight:700;text-anchor:middle}
    .sm{font-size:10.5px;text-anchor:middle;fill:#475569}
    .lbl{font-size:11px;fill:#334155}
    .reg{fill:#dbeafe;stroke:#1d4ed8;stroke-width:1.5}
    .scr{fill:#e0e7ff;stroke:#4338ca;stroke-width:1.8}
    .alu{fill:#fde68a;stroke:#b45309;stroke-width:1.5}
    .mem{fill:#bbf7d0;stroke:#15803d;stroke-width:1.5}
    .ctrl{fill:#ddd6fe;stroke:#6d28d9;stroke-width:1.5}
    .cc{fill:#fbcfe8;stroke:#be185d;stroke-width:1.5}
    .konst{fill:#ccfbf1;stroke:#0d9488;stroke-width:1.5}
    .fp{fill:#f1f5f9;stroke:#475569;stroke-width:1.5}
    .wire{stroke:#475569;stroke-width:1.6;fill:none}
    .tap{stroke:#94a3b8;stroke-width:1;fill:none}
    .taps{stroke:#c2410c;stroke-width:1.6;fill:none}
    .dash{stroke:#64748b;stroke-width:1.6;fill:none;stroke-dasharray:5 4}
  </style>

  <rect x="0" y="0" width="1200" height="910" fill="#f8fafc"/>

  <text x="500" y="32" class="tb" font-size="22">BLIP — CPU Internal Architecture</text>
  <text x="500" y="53" class="t" font-size="12" fill="#475569">16-bit core · LEFT / RIGHT / Z buses · 2 scratch + constant-gen · shadow-register panel — tentative working direction (D-34 / D-35)</text>

  <!-- CPU boundary -->
  <rect x="24" y="72" width="940" height="568" rx="12" fill="none" stroke="#6b7280" stroke-width="1.6" stroke-dasharray="8 5"/>
  <text x="40" y="92" class="lbl" font-style="italic">CPU — functional boundary (G6)</text>

  <!-- ===== registers ===== -->
  <text x="44" y="112" class="lbl">Discrete 16-bit register file (G5 / R-HW-4) — all drive LEFT, latch Z; scratch also drive RIGHT</text>
  <g>
    <rect class="reg" x="44"  y="120" width="84" height="46" rx="6"/><text x="86"  y="142" class="tb">D</text><text x="86" y="158" class="sm">(A:B)</text>
    <rect class="reg" x="144" y="120" width="84" height="46" rx="6"/><text x="186" y="148" class="tb">X</text>
    <rect class="reg" x="244" y="120" width="84" height="46" rx="6"/><text x="286" y="148" class="tb">Y</text>
    <rect class="reg" x="344" y="120" width="84" height="46" rx="6"/><text x="386" y="148" class="tb">USP</text>
    <rect class="reg" x="444" y="120" width="84" height="46" rx="6"/><text x="486" y="148" class="tb">SSP</text>
    <rect class="reg" x="544" y="120" width="84" height="46" rx="6"/><text x="586" y="148" class="tb">PC</text>
    <rect class="reg" x="644" y="120" width="84" height="46" rx="6"/><text x="686" y="148" class="tb">MAR</text>
    <rect class="scr" x="744" y="120" width="84" height="46" rx="6"/><text x="786" y="148" class="tb">SCR1</text>
    <rect class="scr" x="844" y="120" width="84" height="46" rx="6"/><text x="886" y="148" class="tb">SCR2</text>
  </g>

  <!-- taps to LEFT (and across Z) -->
  <g class="tap">
    <line x1="86" y1="166" x2="86" y2="216"/><line x1="186" y1="166" x2="186" y2="216"/>
    <line x1="286" y1="166" x2="286" y2="216"/><line x1="386" y1="166" x2="386" y2="216"/>
    <line x1="486" y1="166" x2="486" y2="216"/><line x1="586" y1="166" x2="586" y2="216"/>
    <line x1="686" y1="166" x2="686" y2="216"/>
  </g>
  <!-- scratch taps continue to RIGHT -->
  <g class="taps">
    <line x1="786" y1="166" x2="786" y2="244"/><line x1="886" y1="166" x2="886" y2="244"/>
  </g>

  <!-- buses -->
  <rect x="40" y="187" width="888" height="6" rx="3" fill="#16a34a"/>
  <text x="44" y="183" class="sm" text-anchor="start" fill="#16a34a">Z · result (any reg latches)</text>
  <rect x="40" y="213" width="888" height="6" rx="3" fill="#2563eb"/>
  <text x="44" y="231" class="sm" text-anchor="start" fill="#2563eb">LEFT · source (any reg drives)</text>
  <rect x="40" y="241" width="888" height="6" rx="3" fill="#ea580c"/>
  <text x="932" y="248" class="sm" text-anchor="start" fill="#c2410c">RIGHT</text>
  <text x="44" y="263" class="sm" text-anchor="start" fill="#c2410c">RIGHT · scratch + constants only</text>

  <!-- constant generator -->
  <rect class="konst" x="44" y="300" width="180" height="42" rx="6"/>
  <text x="134" y="320" class="tb">constant generator</text>
  <text x="134" y="336" class="sm">0 / 1 / 2 / -1</text>
  <line class="taps" x1="134" y1="300" x2="134" y2="247" marker-end="url(#aro)"/>
  <text x="142" y="284" class="sm" text-anchor="start" fill="#c2410c">→ RIGHT</text>

  <!-- ALU -->
  <rect class="alu" x="300" y="300" width="220" height="100" rx="6"/>
  <text x="410" y="332" class="tb">16-bit ALU</text>
  <text x="410" y="354" class="t" font-size="12">+  -  &amp; | ^  &lt;&lt; &gt;&gt;</text>
  <text x="410" y="374" class="sm">inc / dec · compare</text>
  <line class="wire" x1="340" y1="219" x2="340" y2="300" marker-end="url(#ar)"/><text x="340" y="288" class="sm">LEFT</text>
  <line class="taps" x1="480" y1="247" x2="480" y2="300" marker-end="url(#aro)"/><text x="480" y="288" class="sm" fill="#c2410c">RIGHT</text>
  <line class="wire" x1="410" y1="300" x2="410" y2="193" marker-end="url(#ar)"/><text x="418" y="276" class="sm" text-anchor="start">result → Z</text>

  <!-- CC -->
  <rect class="cc" x="300" y="430" width="190" height="38" rx="6"/>
  <text x="395" y="454" class="t">CC · M H I N Z V C</text>
  <line class="wire" x1="395" y1="400" x2="395" y2="430" marker-end="url(#ar)"/><text x="404" y="422" class="sm" text-anchor="start">flags</text>

  <!-- MMU -->
  <rect class="mem" x="600" y="300" width="324" height="104" rx="6"/>
  <text x="762" y="326" class="tb">MMU — internal</text>
  <text x="762" y="346" class="sm">page-table SRAM · kernel / user map sets</text>
  <text x="762" y="364" class="sm">MAR[15:13] → 11-bit frame · [12:0] offset</text>
  <text x="762" y="382" class="sm">→ 24-bit physical (8 KB pages, 16 MB)</text>
  <line class="wire" x1="686" y1="166" x2="686" y2="300" marker-end="url(#ar)"/><text x="694" y="288" class="sm" text-anchor="start">MAR</text>
  <line class="wire" x1="924" y1="350" x2="978" y2="350" marker-end="url(#ar)"/>

  <!-- MDR -->
  <rect class="mem" x="600" y="430" width="190" height="42" rx="6"/>
  <text x="695" y="456" class="t">MDR — 8-bit data</text>
  <line class="wire" x1="790" y1="451" x2="978" y2="451" marker-end="url(#ar)"/>
  <path class="wire" d="M600,451 H560 V193" marker-end="url(#ar)"/>
  <text x="566" y="300" class="sm" text-anchor="start">posts on Z</text>

  <!-- footnote: incrementer open -->
  <text x="300" y="492" class="sm" text-anchor="start" fill="#94a3b8">PC/MAR/X/Y are off-bus +1 up-counters; +2/-1/-2 via ALU + const-gen (D-36)</text>

  <!-- ===== control ===== -->
  <text x="44" y="504" class="lbl">Microcoded control (G8) — dispatch by microaddress formation (D-24); WCS boot-copied from EEPROM (D-03)</text>
  <rect class="ctrl" x="70"  y="512" width="150" height="42" rx="6"/><text x="145" y="538" class="t">IR + postbyte</text>
  <rect class="ctrl" x="250" y="512" width="176" height="42" rx="6"/><text x="338" y="534" class="t">next-addr / dispatch</text><text x="338" y="550" class="sm">(µaddr from IR)</text>
  <rect class="ctrl" x="456" y="512" width="66" height="42" rx="6"/><text x="489" y="538" class="tb">µPC</text>
  <rect class="ctrl" x="552" y="504" width="168" height="58" rx="6"/><text x="636" y="528" class="t">Writable Control</text><text x="636" y="546" class="t">Store (SRAM)</text>
  <rect class="ctrl" x="750" y="504" width="160" height="58" rx="6"/><text x="830" y="528" class="t">control word</text><text x="830" y="546" class="sm">(pipelined)</text>
  <rect class="ctrl" x="552" y="582" width="168" height="34" rx="6"/><text x="636" y="604" class="sm">boot ROM / EEPROM → WCS</text>

  <line class="wire" x1="220" y1="533" x2="250" y2="533" marker-end="url(#ar)"/>
  <line class="wire" x1="426" y1="533" x2="456" y2="533" marker-end="url(#ar)"/>
  <line class="wire" x1="522" y1="533" x2="552" y2="533" marker-end="url(#ar)"/>
  <line class="wire" x1="720" y1="533" x2="750" y2="533" marker-end="url(#ar)"/>
  <line class="wire" x1="636" y1="582" x2="636" y2="562" marker-end="url(#ar)"/>
  <line class="wire" x1="830" y1="504" x2="830" y2="480" marker-end="url(#ar)" stroke-width="2.4"/>
  <text x="830" y="474" class="sm">control word → datapath · ALU · MMU · memory</text>
  <path class="dash" d="M636,472 V490 H145 V512" marker-end="url(#ar)"/><text x="380" y="486" class="sm">opcode → IR</text>
  <path class="dash" d="M360,468 V512" marker-end="url(#ar)"/><text x="364" y="486" class="sm" text-anchor="start">cond</text>

  <!-- ===== external interface ===== -->
  <text x="1080" y="106" class="tb" font-size="12">Functional</text>
  <text x="1080" y="122" class="tb" font-size="12">interface (D-29)</text>
  <text x="982" y="354" class="lbl" text-anchor="start">A[23:0]  (out)</text>
  <text x="982" y="455" class="lbl" text-anchor="start">D[7:0]  (in/out)</text>
  <g>
    <line class="wire" x1="964" y1="150" x2="994" y2="150" marker-end="url(#ar)"/><text x="1000" y="154" class="lbl" text-anchor="start">/RD  (out)</text>
    <line class="wire" x1="964" y1="172" x2="994" y2="172" marker-end="url(#ar)"/><text x="1000" y="176" class="lbl" text-anchor="start">/WR  (out)</text>
    <line class="wire" x1="994" y1="194" x2="964" y2="194" marker-end="url(#ar)"/><text x="1000" y="198" class="lbl" text-anchor="start">/WAIT  (in)</text>
    <line class="wire" x1="994" y1="220" x2="964" y2="220" marker-end="url(#ar)"/><text x="1000" y="224" class="lbl" text-anchor="start">CLK  (in)</text>
    <line class="wire" x1="994" y1="244" x2="964" y2="244" marker-end="url(#ar)"/><text x="1000" y="248" class="lbl" text-anchor="start">/RESET  (in)</text>
    <line class="wire" x1="994" y1="268" x2="964" y2="268" marker-end="url(#ar)"/><text x="1000" y="272" class="lbl" text-anchor="start">/IRQ  (in)</text>
    <line class="wire" x1="994" y1="292" x2="964" y2="292" marker-end="url(#ar)"/><text x="1000" y="296" class="lbl" text-anchor="start">/NMI  (in)</text>
    <line class="wire" x1="994" y1="316" x2="964" y2="316" marker-end="url(#ar)"/><text x="1000" y="320" class="lbl" text-anchor="start">/BUSREQ  (in)</text>
    <line class="wire" x1="964" y1="340" x2="994" y2="340" marker-end="url(#ar)"/><text x="1000" y="344" class="lbl" text-anchor="start">/BUSGRANT (out)</text>
  </g>

  <!-- ===== front panel (shadow registers) ===== -->
  <rect class="fp" x="40" y="700" width="720" height="160" rx="10"/>
  <text x="56" y="724" class="tb" text-anchor="start">Front panel — shadow-register display (tentative, G5/G6; debug i/f D-13)</text>
  <text x="56" y="744" class="lbl" text-anchor="start">Mirrors each CPU register by latching the Z bus on the matching load strobe →</text>
  <text x="56" y="760" class="lbl" text-anchor="start">drives LEDs. So CPU registers need no display tap; only Z + strobes + clock are routed.</text>
  <g>
    <rect class="reg" x="56"  y="784" width="74" height="34" rx="5"/><text x="93"  y="805" class="sm">sh-D</text>
    <rect class="reg" x="140" y="784" width="74" height="34" rx="5"/><text x="177" y="805" class="sm">sh-X</text>
    <rect class="reg" x="224" y="784" width="74" height="34" rx="5"/><text x="261" y="805" class="sm">sh-PC</text>
    <rect class="reg" x="308" y="784" width="74" height="34" rx="5"/><text x="345" y="805" class="sm">sh-…</text>
    <text x="398" y="805" class="lbl" text-anchor="start">(one shadow per register)</text>
  </g>
  <text x="56" y="844" class="lbl" text-anchor="start">→ LED banks (every register continuously visible)</text>
  <!-- feed from Z + strobes -->
  <line class="dash" x1="300" y1="640" x2="300" y2="700" marker-end="url(#ar)"/>
  <text x="308" y="676" class="sm" text-anchor="start">Z bus + per-register load strobes</text>

  <!-- ===== legend ===== -->
  <g>
    <rect x="800" y="704" width="14" height="14" rx="3" class="reg"/><text x="820" y="716" class="lbl" text-anchor="start">register</text>
    <rect x="800" y="726" width="14" height="14" rx="3" class="scr"/><text x="820" y="738" class="lbl" text-anchor="start">scratch reg</text>
    <rect x="800" y="748" width="14" height="14" rx="3" class="alu"/><text x="820" y="760" class="lbl" text-anchor="start">ALU</text>
    <rect x="800" y="770" width="14" height="14" rx="3" class="konst"/><text x="820" y="782" class="lbl" text-anchor="start">constant gen</text>
    <rect x="940" y="704" width="14" height="14" rx="3" class="mem"/><text x="960" y="716" class="lbl" text-anchor="start">MMU / memory</text>
    <rect x="940" y="726" width="14" height="14" rx="3" class="ctrl"/><text x="960" y="738" class="lbl" text-anchor="start">control / microcode</text>
    <rect x="940" y="748" width="14" height="14" rx="3" class="cc"/><text x="960" y="760" class="lbl" text-anchor="start">flags</text>
    <rect x="940" y="770" width="14" height="14" rx="3" class="fp"/><text x="960" y="782" class="lbl" text-anchor="start">front panel</text>
  </g>
</svg>
